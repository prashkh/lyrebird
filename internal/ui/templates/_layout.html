{{define "layout"}}<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} — Lyrebird</title>
<script>
// Set theme before first paint to avoid flash. Default = dark.
(function () {
  try {
    var t = localStorage.getItem("lyre-theme") || "dark";
    document.documentElement.setAttribute("data-theme", t);
  } catch (e) {}
})();
</script>
<style>
/* ─────────────────── Design tokens ─────────────────── */
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --radius-sm: 4px;
  --radius:    8px;
  --radius-lg: 12px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow:    0 4px 16px rgba(0,0,0,0.08);

  /* Brand — Flexcompute green family. Same in both themes; tone swap below. */
  --brand:        #00b870;  /* primary, vivid for dark bg */
  --brand-strong: #00d480;
  --brand-deep:   #00643c;  /* Flexcompute's literal --brand-primary */

  /* Actor accents */
  --actor-you:   #f5b942;   /* warm amber */
  --actor-ai:    #7da9ff;   /* cool blue */
  --actor-lyre:  var(--brand);
}

/* Dark theme (default) */
:root[data-theme="dark"] {
  --bg:          #0f1113;
  --surface:     #16191c;
  --surface-2:   #1d2024;
  --surface-3:   #252a30;
  --border:      #292e34;
  --border-soft: #1f2328;
  --text:        #e6e8eb;
  --text-2:      #b3b8bf;
  --text-dim:    #7a8089;
  --text-faint:  #555b62;
  --link:        var(--brand-strong);

  --diff-add-bg:    #0d3318;
  --diff-add-fg:    #4ec979;
  --diff-del-bg:    #3d1418;
  --diff-del-fg:    #ef7178;
  --diff-hunk-bg:   #0a2e44;
  --diff-hunk-fg:   #6db5e0;
  --diff-context-bg:#16191c;
  --diff-context-fg:#d6d8db;
  --diff-stat-bg:   #1d2024;

  --prompt-bg:      rgba(125, 169, 255, 0.07);
  --prompt-border:  #7da9ff;
  --asst-bg:        rgba(0, 184, 112, 0.07);
  --asst-border:    var(--brand);

  --avatar-you-bg:  rgba(245, 185, 66, 0.13);
  --avatar-ai-bg:   rgba(125, 169, 255, 0.13);
  --avatar-lyre-bg: rgba(0, 184, 112, 0.13);

  /* Chapter card — slightly warmer than surface so the "page" reads as paper */
  --chapter-bg: #181a1d;
  --chapter-hover: #1f2326;
}

/* Light theme */
:root[data-theme="light"] {
  --bg:          #f8f9fa;
  --surface:     #ffffff;
  --surface-2:   #f3f4f6;
  --surface-3:   #e8eaed;
  --border:      #e5e7eb;
  --border-soft: #f1f2f4;
  --text:        #0f1113;
  --text-2:      #475467;
  --text-dim:    #6b7280;
  --text-faint:  #9ca3af;
  --link:        var(--brand-deep);

  --diff-add-bg:    #e6ffec;
  --diff-add-fg:    #1a7f37;
  --diff-del-bg:    #ffebe9;
  --diff-del-fg:    #cf222e;
  --diff-hunk-bg:   #ddf4ff;
  --diff-hunk-fg:   #57606a;
  --diff-context-bg:#ffffff;
  --diff-context-fg:#1f2328;
  --diff-stat-bg:   #f3f4f6;

  --prompt-bg:      #f0f5ff;
  --prompt-border:  #2a5fb4;
  --asst-bg:        #ecfdf5;
  --asst-border:    var(--brand-deep);

  --avatar-you-bg:  #fff7e0;
  --avatar-ai-bg:   #e6efff;
  --avatar-lyre-bg: #d6f5e6;

  --chapter-bg: #fdfcf7;  /* warm cream paper */
  --chapter-hover: #f6f4ec;
}

/* ─────────────────── Base ─────────────────── */
* { box-sizing: border-box; }
html, body { background: var(--bg); }
body { margin: 0; font-family: var(--font-sans); color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
a { color: var(--link); text-decoration: none; }
a:hover { text-decoration: underline; }
code { font-family: var(--font-mono); font-size: 0.92em; background: var(--surface-2); padding: 1.5px 5px; border-radius: 3px; color: var(--text); }
.dim { color: var(--text-dim); }
.small { font-size: 12px; }

/* SVG icon defaults */
.icon { width: 16px; height: 16px; vertical-align: -3px; flex-shrink: 0; }

/* ─────────────────── Header ─────────────────── */
header.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky; top: 0; z-index: 10;
}
.logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; color: var(--text); letter-spacing: -0.01em; text-decoration: none; }
.logo .icon { width: 20px; height: 20px; color: var(--brand); }
.logo:hover { text-decoration: none; }
.topbar nav { display: flex; gap: 4px; }
.topbar nav a { color: var(--text-2); font-size: 13px; padding: 6px 10px; border-radius: var(--radius-sm); }
.topbar nav a:hover { background: var(--surface-2); color: var(--text); text-decoration: none; }
.topbar .spacer { flex: 1; }
.searchbox { position: relative; }
.searchbox .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-dim); pointer-events: none; }
.searchbox input { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px 6px 32px; font-size: 13px; width: 240px; font-family: inherit; }
.searchbox input::placeholder { color: var(--text-faint); }
.searchbox input:focus { outline: none; border-color: var(--brand); }
.theme-toggle { background: transparent; border: 1px solid var(--border); color: var(--text-2); padding: 6px 8px; border-radius: var(--radius-sm); cursor: pointer; display: inline-flex; align-items: center; }
.theme-toggle:hover { background: var(--surface-2); color: var(--text); }
.theme-toggle .icon { width: 15px; height: 15px; }
:root[data-theme="dark"] .theme-toggle .sun-icon { display: inline-flex; }
:root[data-theme="dark"] .theme-toggle .moon-icon { display: none; }
:root[data-theme="light"] .theme-toggle .sun-icon { display: none; }
:root[data-theme="light"] .theme-toggle .moon-icon { display: inline-flex; }

/* ─────────────────── Layout ─────────────────── */
main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }
h2 { margin: 0 0 8px; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
h3 { margin: 0 0 8px; font-size: 16px; font-weight: 600; color: var(--text); }
.subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 22px; }
.flash { background: var(--asst-bg); border: 1px solid var(--asst-border); padding: 10px 16px; border-radius: var(--radius); margin-bottom: 20px; font-size: 13px; color: var(--text); }

/* ─────────────────── Hero ─────────────────── */
.hero { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 24px; padding-bottom: 22px; border-bottom: 1px solid var(--border); }
.hero-main { flex: 1; min-width: 0; }
.hero h2 { margin-bottom: 6px; }
.hero-sub { color: var(--text-2); font-size: 14px; line-height: 1.55; }
.hero-sub .num { color: var(--text); font-weight: 600; }
.hero-actions { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap; }

/* ─────────────────── Buttons ─────────────────── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; font-family: inherit; line-height: 1; transition: background 0.12s ease, border-color 0.12s ease; }
.btn:hover { text-decoration: none; }
.btn-primary { background: var(--brand); color: #051c12; border-color: var(--brand); }
.btn-primary:hover { background: var(--brand-strong); border-color: var(--brand-strong); }
.btn-ghost { background: transparent; color: var(--text); border-color: var(--border); }
.btn-ghost:hover { background: var(--surface-2); border-color: var(--text-dim); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Save-now popover (uses <details>) */
details.snap-menu { position: relative; }
details.snap-menu > summary { list-style: none; }
details.snap-menu > summary::-webkit-details-marker { display: none; }
.snap-form { display: flex; gap: 6px; position: absolute; right: 0; top: calc(100% + 6px); background: var(--surface); border: 1px solid var(--border); padding: 10px; border-radius: var(--radius); box-shadow: var(--shadow); min-width: 300px; z-index: 5; }
.snap-form input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--surface-2); color: var(--text); }
.snap-form input::placeholder { color: var(--text-faint); }

/* ─────────────────── File chips ─────────────────── */
.filelist-row { display: flex; flex-wrap: wrap; gap: 6px 8px; align-items: center; padding: 6px 0 26px; }
.file-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--surface-2); color: var(--text-2); padding: 3px 9px; border-radius: 999px; font-family: var(--font-mono); font-size: 12px; text-decoration: none; border: 1px solid var(--border-soft); }
.file-chip:hover { background: var(--surface-3); color: var(--text); border-color: var(--border); text-decoration: none; }
.file-chip .icon { width: 12px; height: 12px; opacity: 0.6; }

/* ─────────────────── Story view: chapters + spine ─────────────────── */

/* Chapter card — each day is a "page" with a soft warm tone and serif heading */
.chapter { background: var(--chapter-bg, var(--surface)); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 22px; box-shadow: var(--shadow-sm); overflow: hidden; }
.chapter-head { padding: 18px 24px 14px; border-bottom: 1px solid var(--border-soft); display: flex; align-items: baseline; gap: 14px; }
.chapter-num { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); padding: 3px 8px; border: 1px solid var(--border); border-radius: 999px; }
.chapter-title { margin: 0; font-family: "Georgia", "Iowan Old Style", "Charter", serif; font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }

/* The vertical spine inside each chapter.
   --spine-x is the X-coordinate (relative to .chapter-spine AND each .story-item
   inside it) where both the line and every node center MUST sit. We give
   .chapter-spine zero left/right padding and put the horizontal padding on
   .story-item instead so both elements share the same coordinate origin. */
.chapter-spine { --spine-x: 32px; padding: 8px 0 14px 0; position: relative; }
.chapter-spine::before { content: ""; position: absolute; left: var(--spine-x); top: 18px; bottom: 18px; width: 2px; background: var(--border); border-radius: 1px; transform: translateX(-1px); }

/* Story items hang off the spine. The .node-link is positioned absolutely
   inside the story-item, with translateX(-50%) so its center is exactly at
   --spine-x — matching the spine line above. */
.story-item { display: block; padding: 14px 22px 14px 60px; min-height: 48px; color: var(--text); position: relative; border-radius: var(--radius); transition: background 0.12s ease; }
.story-item + .story-item { border-top: 1px dashed var(--border-soft); }
.story-item.story-quiet { padding-top: 10px; padding-bottom: 10px; opacity: 0.6; }
.story-item:hover { background: var(--chapter-hover, var(--surface-2)); }

/* Node sits EXACTLY on the spine. We use translateX(-50%) so the visual
   center of the node is at exactly --spine-x, regardless of node width. */
.node-link { position: absolute; left: var(--spine-x); top: 22px; transform: translateX(-50%); z-index: 2; pointer-events: none; }
.node { display: block; width: 12px; height: 12px; border-radius: 50%; background: var(--chapter-bg, var(--surface)); border: 2.5px solid var(--text-dim); transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease; box-sizing: border-box; }
.node-you  { border-color: var(--actor-you); }
.node-ai   { border-color: var(--actor-ai); }
.node-lyre { border-color: var(--actor-lyre); }
.story-item:hover .node { transform: scale(1.25); }
.story-item.story-you:hover .node  { background: var(--actor-you); }
.story-item.story-ai:hover .node   { background: var(--actor-ai); }
.story-item.story-lyre:hover .node { background: var(--actor-lyre); }

/* Inner header row: avatar + headline */
.story-header { display: flex; gap: 12px; align-items: flex-start; }
.story-item .avatar { margin-top: 1px; }
.story-item.story-quiet .avatar { width: 22px; height: 22px; }
.story-item.story-quiet .avatar .icon { width: 12px; height: 12px; }
.story-item .story-body { flex: 1; min-width: 0; }

/* The whole row is clickable via an overlay <a> that fills the item.
   Inner links (file pills, "rewind to here", "show conversation") sit on
   z-index 2 so they remain independently clickable. */
.story-overlay { position: absolute; inset: 0; z-index: 1; border-radius: inherit; }
.story-overlay:hover { text-decoration: none; }
.story-quote, .story-actions, .inline-file, .actor-name { position: relative; z-index: 2; }

.story-link { color: inherit; }
.story-link:hover { text-decoration: none; }

/* Show / file detail hero */
.show-hero { display: flex; align-items: flex-start; gap: 18px; padding-bottom: 18px; margin-bottom: 22px; border-bottom: 1px solid var(--border); }
.show-hero-main { flex: 1; min-width: 0; }
.show-hero-actions { flex-shrink: 0; }

/* File history page */
.back-link { display: inline-flex; align-items: center; gap: 4px; color: var(--text-dim); font-size: 13px; margin-bottom: 12px; }
.back-link:hover { color: var(--text); text-decoration: none; }
.back-link .icon { width: 14px; height: 14px; }
.file-hero { padding-bottom: 18px; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
.file-title { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.01em; }
.file-title .icon { width: 22px; height: 22px; opacity: 0.7; }
.file-mono { font-family: var(--font-mono); font-size: 22px; font-weight: 700; }
.file-history .story-item { padding: 14px 12px; border-bottom: 1px solid var(--border-soft); border-radius: 0; }
.file-history .story-item:last-child { border-bottom: none; }
.badge-current { background: var(--actor-you); color: #1a1a1a; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.04em; margin-right: 8px; vertical-align: 2px; }
.story-actions { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px 14px; align-items: center; }
.story-action { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-dim); background: transparent; border: none; padding: 0; font-family: inherit; cursor: pointer; }
.story-action:hover { color: var(--text); text-decoration: none; }
.story-action .icon { width: 13px; height: 13px; }
.story-action-warn:hover { color: var(--actor-you); }
.inline-form { display: inline; margin: 0; }

/* Inline travel strip on the main timeline page */
.travel-strip { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 22px; overflow: hidden; }
.travel-strip > summary { list-style: none; cursor: pointer; padding: 14px 20px; display: flex; align-items: center; gap: 14px; user-select: none; }
.travel-strip > summary::-webkit-details-marker { display: none; }
.travel-strip > summary:hover { background: var(--surface-2); }
.travel-strip-title { display: inline-flex; align-items: center; gap: 6px; font-weight: 600; color: var(--text); font-size: 14px; }
.travel-strip-title .icon { color: var(--brand); }
.travel-strip-hint { flex: 1; min-width: 0; }
.travel-strip-toggle { opacity: 0.5; }
.travel-strip[open] .travel-strip-toggle::after { content: " (open)"; }
.travel-strip-body { padding: 8px 20px 20px; border-top: 1px solid var(--border-soft); }
.travel-strip-state { margin-top: 14px; }
.travel-strip-headline { font-weight: 600; font-size: 15px; margin-bottom: 6px; color: var(--text); }
.travel-strip-files { display: flex; flex-wrap: wrap; gap: 5px 6px; min-height: 28px; }
.travel-strip-actions { display: flex; gap: 8px; margin-top: 12px; }
.travel-strip-actions[hidden] { display: none; }

/* Time-travel view */
.travel-hero { padding: 8px 0 18px; }
.travel-hero h2 { display: flex; align-items: center; gap: 10px; }
.travel-scrubber { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px 24px; box-shadow: var(--shadow-sm); margin-bottom: 22px; }
.travel-current { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.travel-current-meta { color: var(--text-dim); font-size: 13px; margin-bottom: 18px; }
.travel-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 3px; background: linear-gradient(to right, var(--surface-3), var(--brand) var(--travel-pct, 100%), var(--surface-3) var(--travel-pct, 100%)); outline: none; }
.travel-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--brand); border: 3px solid var(--surface); box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: grab; transition: transform 0.1s; }
.travel-slider::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.15); }
.travel-slider::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: var(--brand); border: 3px solid var(--surface); cursor: grab; }
.travel-axis { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-top: 8px; padding: 0 4px; }
.travel-state { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px 24px; }
.travel-state h3 { font-family: "Georgia", serif; font-size: 18px; font-weight: 600; margin: 0 0 10px; }
.travel-state .filelist-row { padding: 6px 0 0; }
.travel-state .actions { margin-top: 18px; display: flex; gap: 8px; }
.travel-empty { color: var(--text-dim); font-size: 13px; padding: 16px 0; }

.avatar { width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; flex-shrink: 0; margin-top: 1px; }
.avatar .icon { width: 14px; height: 14px; }
.story-you   .avatar { background: var(--avatar-you-bg);  color: var(--actor-you); }
.story-ai    .avatar { background: var(--avatar-ai-bg);   color: var(--actor-ai); }
.story-lyre  .avatar { background: var(--avatar-lyre-bg); color: var(--actor-lyre); }
.story-body { flex: 1; min-width: 0; }
.story-line { font-size: 14px; color: var(--text); line-height: 1.55; }
.actor-name { font-weight: 600; margin-right: 6px; }
.story-you  .actor-name { color: var(--actor-you); }
.story-ai   .actor-name { color: var(--actor-ai); }
.story-lyre .actor-name { color: var(--actor-lyre); }
.story-quiet .actor-name, .story-quiet .story-line { color: var(--text-dim); font-weight: 500; }
.when { color: var(--text-dim); font-size: 12px; margin-left: 4px; font-weight: 400; }

/* Inline clickable filenames inside a sentence */
.inline-file { font-family: var(--font-mono); font-size: 0.92em; background: var(--surface-2); color: var(--text); padding: 1px 6px; border-radius: 3px; border: 1px solid var(--border-soft); text-decoration: none; }
.story-item.story-link:hover .inline-file { background: var(--surface-3); }
.inline-file:hover { background: var(--surface-3); text-decoration: none; border-color: var(--border); }

/* AI quote — italic line, no box, subtle indent */
.story-quote { margin-top: 4px; color: var(--text-2); font-size: 13px; line-height: 1.5; font-style: italic; padding-left: 10px; border-left: 2px solid var(--avatar-ai-bg); }
.story-item.story-link:hover .story-quote { border-left-color: var(--actor-ai); color: var(--text); }

/* Empty / onboarding */
.empty { color: var(--text-2); padding: 36px 24px; text-align: center; background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); }
.empty h3 { color: var(--text); margin-bottom: 6px; }

/* ─────────────────── Tables (sessions list etc.) ─────────────────── */
table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border-soft); font-size: 13px; color: var(--text); }
th { background: var(--surface-2); font-weight: 600; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }

/* ─────────────────── Diff (GitHub-flavored, theme-aware) ─────────────────── */
.diffstat { background: var(--diff-stat-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-family: var(--font-mono); font-size: 12px; color: var(--text-2); white-space: pre; overflow-x: auto; margin-bottom: 18px; }
.diff-files { display: flex; flex-direction: column; gap: 18px; }
.diff-file { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--surface); }
.diff-file-header { background: var(--surface-2); border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 13px; color: var(--text); }
.diff-file-header .icon { width: 14px; height: 14px; opacity: 0.7; }
.diff-file-path { font-weight: 600; }
.diff-file-note { font-family: var(--font-sans); font-size: 10px; color: var(--surface); padding: 1px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; background: var(--text-dim); }
.diff-note-new\ file { background: var(--brand); color: #051c12; }
.diff-note-deleted\ file { background: var(--diff-del-fg); color: #fff; }
.diff-body { font-family: var(--font-mono); font-size: 12.5px; line-height: 1.55; overflow-x: auto; background: var(--diff-context-bg); }
.diff-line { display: flex; padding: 0; white-space: pre; min-width: max-content; }
.diff-marker { width: 22px; flex-shrink: 0; text-align: center; color: var(--text-faint); user-select: none; opacity: 0.7; }
.diff-text { padding-right: 14px; color: var(--diff-context-fg); }
.diff-add { background: var(--diff-add-bg); }
.diff-add .diff-marker::before { content: "+"; color: var(--diff-add-fg); }
.diff-add .diff-text { color: var(--diff-add-fg); }
.diff-del { background: var(--diff-del-bg); }
.diff-del .diff-marker::before { content: "−"; color: var(--diff-del-fg); }
.diff-del .diff-text { color: var(--diff-del-fg); }
.diff-context { background: var(--diff-context-bg); }
.diff-context .diff-marker::before { content: " "; }
.diff-hunk { background: var(--diff-hunk-bg); color: var(--diff-hunk-fg); padding: 4px 0; font-size: 12px; }
.diff-hunk .diff-marker { display: none; }
.diff-hunk .diff-text { padding-left: 14px; color: var(--diff-hunk-fg); }
.diff-binary { padding: 14px; color: var(--text-dim); font-size: 13px; }

/* ─────────────────── Snapshot + session detail ─────────────────── */
.event { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 12px; }
.event .meta { display: flex; gap: 10px; align-items: center; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.event .badge { background: var(--actor-ai); color: var(--surface); padding: 1px 7px; border-radius: 3px; font-size: 11px; font-weight: 600; }
.event .badge.manual { background: var(--text-dim); }
.event .show-link { display: inline-flex; align-items: center; gap: 3px; }
.event .prompt { color: var(--text); font-size: 13px; line-height: 1.5; padding: 9px 12px; background: var(--prompt-bg); border-left: 2px solid var(--prompt-border); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.event .prompt em { color: var(--text-dim); font-style: normal; font-weight: 600; margin-right: 4px; }

/* Conversation card on the show page (was the inline-styled prompts) */
.convo-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 22px; }
.convo-turn { padding: 10px 0; }
.convo-turn + .convo-turn { border-top: 1px solid var(--border-soft); }
.convo-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.convo-user .convo-label { color: var(--actor-you); }
.convo-assistant .convo-label { color: var(--actor-ai); }
.convo-text { color: var(--text); font-size: 14px; line-height: 1.55; white-space: pre-wrap; }
.convo-link { display: inline-flex; align-items: center; gap: 4px; margin-top: 10px; font-size: 12px; color: var(--text-dim); }
.convo-link:hover { color: var(--text); text-decoration: none; }

.transcript { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 18px; }
.transcript .turn { padding: 14px 0; border-bottom: 1px solid var(--border-soft); }
.transcript .turn:last-child { border-bottom: none; }
.transcript .role { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.06em; margin-bottom: 6px; }
.transcript .role.assistant { color: var(--actor-ai); }
.transcript .text { white-space: pre-wrap; font-size: 14px; line-height: 1.55; }
.transcript .turn-meta { font-size: 11px; color: var(--text-dim); margin-top: 8px; font-family: var(--font-mono); }

@media (max-width: 720px) { .hero { flex-direction: column; } .searchbox input { width: 160px; } }
</style>
</head>
<body>
<header class="topbar">
  <a href="/" class="logo">{{icon "bird"}} Lyrebird</a>
  <nav>
    <a href="/">Story</a>
    <a href="/sessions">Conversations</a>
  </nav>
  <span class="spacer"></span>
  <form action="/search" method="get" class="searchbox">
    {{icon "search"}}
    <input type="search" name="q" placeholder="Search..." value="{{.Query}}">
  </form>
  <button class="theme-toggle" type="button" aria-label="Toggle theme" onclick="(function(){var d=document.documentElement;var t=d.getAttribute('data-theme')==='dark'?'light':'dark';d.setAttribute('data-theme',t);try{localStorage.setItem('lyre-theme',t);}catch(e){}})()">
    <span class="sun-icon">{{icon "sun"}}</span>
    <span class="moon-icon">{{icon "moon"}}</span>
  </button>
</header>
<main>
{{template "content" .}}
</main>
</body>
</html>{{end}}
